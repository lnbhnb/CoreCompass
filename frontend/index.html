<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreCompass · 校园项目粉碎机</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body>
  <div class="app-shell" x-data="app()" x-init="init()">
    <!-- 左侧罗盘导航栏 -->
    <aside class="compass-rail">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="1.5" opacity="0.4" />
          <circle cx="32" cy="32" r="22" stroke="currentColor" stroke-width="1" opacity="0.25" />
          <path d="M32 8 L36 32 L32 56 L28 32 Z" fill="var(--compass)" />
          <path d="M8 32 L32 28 L56 32 L32 36 Z" fill="var(--brass)" opacity="0.7" />
          <circle cx="32" cy="32" r="3" fill="var(--parchment)" />
        </svg>
        <div class="brand-text">
          <strong>CORE<span>COMPASS</span></strong>
          <em>校园项目粉碎机</em>
        </div>
      </div>

      <!-- 罗盘进度环（项目阶段指针） -->
      <div class="compass-dial" x-show="project" x-cloak>
        <svg viewBox="0 0 200 200" class="dial-svg">
          <circle cx="100" cy="100" r="92" class="dial-ring" />
          <circle cx="100" cy="100" r="78" class="dial-ring-inner" />
          <!-- 方位刻度 -->
          <g class="dial-ticks" stroke="currentColor">
            <line x1="100" y1="14" x2="100" y2="24" />
            <line x1="100" y1="176" x2="100" y2="186" />
            <line x1="14" y1="100" x2="24" y2="100" />
            <line x1="176" y1="100" x2="186" y2="100" />
          </g>
          <text x="100" y="12" text-anchor="middle" class="dial-cardinal">N</text>
          <text x="100" y="196" text-anchor="middle" class="dial-cardinal">S</text>
          <text x="8" y="105" text-anchor="middle" class="dial-cardinal">W</text>
          <text x="192" y="105" text-anchor="middle" class="dial-cardinal">E</text>
          <!-- 指针：外层 ambient 摆动，内层按里程碑进度旋转 -->
          <g class="dial-needle-ambient">
            <g class="dial-needle" :style="`transform: rotate(${needleAngle()}deg)`">
              <path d="M100 28 L106 100 L100 108 L94 100 Z" class="needle-north" />
              <path d="M100 172 L106 100 L100 92 L94 100 Z" class="needle-south" />
              <circle cx="100" cy="100" r="5" class="needle-pivot" />
              <circle cx="100" cy="100" r="9" class="needle-pivot-glow" />
            </g>
          </g>
        </svg>
        <div class="dial-readout">
          <span class="readout-label">当前航向</span>
          <strong class="readout-value" x-text="currentHeading()"></strong>
          <span class="readout-progress" x-text="progressText()"></span>
        </div>
      </div>

      <!-- 导航项 -->
      <nav class="rail-nav" x-show="project" x-cloak>
        <button @click="scrollTo('board')">里程碑看板</button>
        <button @click="scrollTo('notify')">通知日志</button>
      </nav>

      <div class="rail-footer">
        <span class="footer-coord" x-text="coordsLabel()"></span>
        <template x-if="currentUser">
          <div class="compass-user">
            <span class="cu-name" x-text="currentUser.display_name"></span>
            <span class="cu-role"
              x-text="currentRole === 'leader' ? '队长' : (currentRole === 'member' ? '队员' : '')"></span>
            <button class="cu-logout" @click="logout()">登出</button>
          </div>
        </template>
        <template x-if="!currentUser">
          <span class="compass-guest">未登录</span>
        </template>
      </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="canvas">
      <!-- 登录视图 -->
      <template x-if="view === 'login'">
        <section class="auth-view" x-data="authView($data)">
          <div class="auth-card">
            <span class="eyebrow">AUTH · 01</span>
            <h1>启航前请登记</h1>
            <div class="auth-tabs">
              <button :class="{active: mode==='login'}" @click="mode='login'">登录</button>
              <button :class="{active: mode==='register'}" @click="mode='register'">注册</button>
            </div>
            <form @submit.prevent="submit()">
              <label class="field">
                <span>用户名</span>
                <input x-model="form.username" required>
              </label>
              <label class="field">
                <span>密码</span>
                <input type="password" x-model="form.password" required>
              </label>
              <label class="field" x-show="mode==='register'" x-cloak>
                <span>显示名</span>
                <input x-model="form.display_name" :required="mode==='register'">
              </label>
              <p class="auth-error" x-show="error" x-text="error" x-cloak></p>
              <button class="btn-primary" :disabled="loading">
                <span x-text="loading ? '处理中…' : (mode==='login' ? '登录' : '注册')"></span>
              </button>
            </form>
            <div class="auth-join">
              <span class="kb-label">队员？输入队长给的邀请码</span>
              <div class="join-row">
                <input x-model="inviteCode" placeholder="6 位邀请码" maxlength="6">
                <button class="btn-ghost" @click="join()" :disabled="loading || !inviteCode">加入</button>
              </div>
            </div>
          </div>
        </section>
      </template>

      <!-- 项目列表视图 -->
      <template x-if="view === 'projects'">
        <section class="projects-view" x-data="projectList($data)" x-init="init()">
          <header class="board-header">
            <div class="title-block">
              <span class="eyebrow">CHART · MY PROJECTS</span>
              <h1>我的航行</h1>
            </div>
            <div class="header-actions">
              <button class="btn-accent" @click="go('/projects/new')">+ 启动新航行</button>
            </div>
          </header>
          <div class="project-grid">
            <template x-for="(p, idx) in projects" :key="p.id">
              <article class="project-card" @click="go('/projects/' + p.id)">
                <div class="ms-index" x-text="String(idx + 1).padStart(2, '0')"></div>
                <div class="pc-body">
                  <h3 x-text="p.name"></h3>
                  <span class="pc-meta" x-text="progressSummary(p)"></span>
                </div>
                <span class="pc-role" x-text="roleLabel(p)"></span>
              </article>
            </template>
            <p class="empty-state" x-show="!projects.length && !loading">还没有项目。启动一次新航行吧。</p>
          </div>
        </section>
      </template>

      <!-- 成员进度视图 -->
      <template x-if="view === 'members'">
        <section class="members-view" x-data="memberProgress($data)" x-init="init()">
          <header class="board-header">
            <div class="title-block">
              <span class="eyebrow">CREW · PROGRESS</span>
              <h1>成员进度</h1>
            </div>
            <div class="header-actions">
              <template x-if="currentRole === 'leader'">
                <button class="btn-accent" @click="generateInvite()">+ 生成邀请码</button>
              </template>
              <button class="btn-ghost" @click="go('/projects/' + projectId)">← 回看板</button>
            </div>
          </header>

          <!-- 邀请码展示（仅队长，生成后显示） -->
          <template x-if="currentRole === 'leader' && invite">
            <div class="invite-card">
              <span class="iv-label">邀请码（7 天有效，队员注册后输入即可加入）</span>
              <div class="iv-row">
                <code class="iv-code" x-text="invite.code"></code>
                <button class="btn-ghost" @click="copyInviteCode()" x-text="inviteCopied ? '已复制' : '复制'"></button>
              </div>
              <span class="iv-expire" x-text="'过期：' + invite.expires_at.slice(0, 10)"></span>
            </div>
          </template>

          <!-- 待我审阅（仅队长） -->
          <template x-if="currentRole === 'leader' && data.pending_review.length">
            <div class="review-queue">
              <h2>待我审阅（<span x-text="data.pending_review.length"></span>）</h2>
              <template x-for="t in data.pending_review" :key="t.id">
                <div class="review-item">
                  <div class="ri-head">
                    <strong x-text="t.title"></strong>
                    <span class="ri-time" x-text="'ID #' + t.id"></span>
                  </div>
                  <input class="ri-comment" x-model="reviewComment" placeholder="审阅意见（可选）">
                  <div class="ri-actions">
                    <a :href="downloadUrl(t.id)" target="_blank">查看产物</a>
                    <button class="btn-approve" @click="review(t.id, 'approved')">通过</button>
                    <button class="btn-reject" @click="review(t.id, 'rejected')">拒绝</button>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- 成员列表 -->
          <div class="member-grid">
            <template x-for="m in data.members" :key="m.user.id">
              <article class="member-card">
                <div class="mc-head">
                  <span class="mc-avatar" x-text="m.user.display_name.charAt(0)"></span>
                  <div>
                    <h3 x-text="m.user.display_name"></h3>
                    <span class="mc-role" x-text="m.role === 'leader' ? '队长' : '队员'"></span>
                  </div>
                </div>
                <div class="mc-stats">
                  <span>负责 <strong x-text="m.total"></strong></span>
                  <span>完成 <strong x-text="m.done"></strong></span>
                  <span>审阅中 <strong x-text="m.pending_review"></strong></span>
                  <span>待办 <strong x-text="m.todo"></strong></span>
                </div>
                <div class="mc-bar">
                  <div class="mc-bar-fill" :style="`width: ${m.percent}%`"></div>
                </div>
                <span class="mc-pct" x-text="m.percent + '%'"></span>
              </article>
            </template>
          </div>
        </section>
      </template>

      <!-- 创建项目视图 -->
      <template x-if="view === 'create'">
        <section class="create-view">
          <span class="corner-mark tl">N · 00°00'</span>
          <span class="corner-mark bl">SECTOR · A3</span>
          <div class="create-hero">
            <span class="eyebrow">AGENT · 项目拆解</span>
            <h1>别让大课题<em>悄悄沉船。</em></h1>
            <p>CoreCompass 是你的项目导航员。它用真实状态机强制验收产出、在偏航时主动重算路线、按计划定时催办——而不是只会附和的聊天框。</p>
          </div>

          <div class="create-form-panel" x-data="projectCreate($data)">
            <h2>启动一次航行</h2>
            <form @submit.prevent="submit()">
              <label class="field">
                <span>项目名</span>
                <input x-model="form.name" required placeholder="校园二手交易平台">
              </label>
              <div class="field-row">
                <label class="field">
                  <span>截止日期</span>
                  <input type="date" x-model="form.deadline" required>
                </label>
                <label class="field">
                  <span>团队人数</span>
                  <input type="number" x-model.number="form.team_size" min="1" max="10">
                </label>
              </div>
              <label class="field">
                <span>课题描述</span>
                <textarea x-model="form.topic_desc" rows="4" required placeholder="描述你要做什么——关键词越多，知识库匹配越准"></textarea>
              </label>
              <button class="btn-primary" :disabled="submitting">
                <span x-text="submitting ? '导航员正在拆解航线…' : '生成拆解计划'"></span>
              </button>
            </form>
          </div>

          <div class="create-trio">
            <div class="trio-item">
              <span class="trio-num">01</span>
              <h3>硬验收</h3>
              <p>上传空文件会被红色拒绝，里程碑锁定。</p>
            </div>
            <div class="trio-item">
              <span class="trio-num">02</span>
              <h3>动态重算</h3>
              <p>偏航时算产能缺口，砍可选任务、保核心。</p>
            </div>
            <div class="trio-item">
              <span class="trio-num">03</span>
              <h3>主动打扰</h3>
              <p>定时扫描逾期，飞书群收到 Agent 催办。</p>
            </div>
          </div>
        </section>
      </template>

      <!-- 项目看板视图 -->
      <template x-if="view === 'board'">
        <section class="board-view">
          <!-- 项目标题区 + 航向仪表条 -->
          <header class="board-header" id="board">
            <div class="title-block">
              <span class="eyebrow" x-text="project?.status === 'crisis' ? '⚠ 航向偏移' : '航行中'"></span>
              <h1 x-text="project?.name"></h1>
              <div class="title-meta">
                <span x-text="`截止 ${formatDate(project?.deadline)}`"></span>
                <span x-text="`${project?.team_size} 人团队`"></span>
                <span x-text="coordsLabel()"></span>
              </div>
            </div>
            <div class="header-stats">
              <div class="stat-cell">
                <span class="stat-label">里程碑</span>
                <strong class="stat-value" x-text="progressText()"></strong>
                <div class="stat-bar">
                  <div class="stat-bar-fill" :style="`width: ${milestonePct()}%`"></div>
                </div>
              </div>
              <div class="stat-cell">
                <span class="stat-label">任务进度</span>
                <strong class="stat-value" x-text="taskProgressText()"></strong>
                <div class="stat-bar">
                  <div class="stat-bar-fill signal" :style="`width: ${taskPct()}%`"></div>
                </div>
              </div>
              <div class="stat-cell">
                <span class="stat-label">航向</span>
                <strong class="stat-value compass" x-text="currentHeading()"></strong>
                <div class="stat-bar">
                  <div class="stat-bar-fill brass" :style="`width: ${needleAngle()/3.6}%`"></div>
                </div>
              </div>
            </div>
            <div class="header-actions">
              <button class="btn-ghost" @click="navigate('/projects/' + project.id + '/members')">成员进度</button>
              <button class="btn-ghost" @click="triggerOverdue()">模拟偏航</button>
              <button class="btn-accent" @click="proposeReplan()">触发重规划</button>
            </div>
          </header>

          <!-- 知识库参考标签 -->
          <div x-show="usedReferences" class="kb-refs" x-cloak>
            <span class="kb-label">📚 本次拆解参考了</span>
            <template x-if="usedReferences?.sdlc">
              <span class="kb-tag">SDLC · <span x-text="usedReferences?.sdlc"></span></span>
            </template>
            <template x-for="p in usedReferences?.projects || []" :key="p">
              <span class="kb-tag" x-text="'相似项目 · ' + p"></span>
            </template>
            <template x-for="c in usedReferences?.contests || []" :key="c">
              <span class="kb-tag" x-text="'赛程 · ' + c"></span>
            </template>
          </div>

          <!-- 里程碑卡片网格 -->
          <div class="board-grid" x-data="taskBoard($data)">
            <template x-for="g in groupByMilestone()" :key="g.milestone.id">
              <article class="milestone-card" :class="milestoneClass(g.milestone)">
                <header class="ms-head">
                  <div class="ms-index" x-text="String(g.milestone.order_idx + 1).padStart(2, '0')"></div>
                  <div class="ms-title">
                    <h3 x-text="g.milestone.name"></h3>
                    <span class="ms-type" x-text="artifactLabel(g.milestone.expected_artifact_type)"></span>
                  </div>
                  <span class="ms-status" x-text="milestoneStatusLabel(g.milestone.status)"></span>
                </header>

                <ul class="task-list">
                  <template x-for="t in g.tasks" :key="t.id">
                    <li class="task-item" :class="t.status">
                      <span class="task-dot" :class="t.priority"></span>
                      <div class="task-body">
                        <span class="task-title" x-text="t.title"></span>
                        <span class="task-tags">
                          <em x-text="statusLabel(t.status)"></em>
                          <em class="pri" x-text="priorityLabel(t.priority)"></em>
                        </span>
                      </div>
                      <template x-if="t.status === 'planned'">
                        <button class="btn-mini" @click="updateStatus(t.id, 'start')">开始</button>
                      </template>
                      <template x-if="t.status === 'doing'">
                        <button class="btn-mini" @click="updateStatus(t.id, 'complete')">完成</button>
                      </template>
                    </li>
                  </template>
                </ul>

                <!-- 上传验收区 -->
                <div class="upload-zone" x-data="uploadPanel($root)">
                  <div class="upload-row">
                    <input type="file" :id="'file-'+g.milestone.id" class="upload-input">
                    <label :for="'file-'+g.milestone.id" class="upload-label">选择产物文件</label>
                    <button class="btn-mini"
                      @click="upload(g.milestone.id, $el.previousElementSibling.previousElementSibling)"
                      :disabled="uploading">
                      <span x-text="uploading ? '校验中…' : '上传验收'"></span>
                    </button>
                  </div>
                  <div x-show="lastResult" class="upload-result" :class="lastResult?.pass ? 'pass' : 'fail'" x-cloak>
                    <span class="result-icon" x-text="lastResult?.pass ? '✓' : '✗'"></span>
                    <span x-text="lastResult?.pass ? '通过，解锁下一阶段' : '未通过'"></span>
                    <ul x-show="lastResult?.reasons?.length">
                      <template x-for="r in lastResult?.reasons || []">
                        <li x-text="r"></li>
                      </template>
                    </ul>
                  </div>
                </div>
              </article>
            </template>
          </div>

          <!-- 通知日志 -->
          <section class="notify-panel" id="notify" x-data="notifyLog($data)" x-init="init()">
            <header class="panel-head">
              <h2>通知日志</h2>
              <button class="btn-ghost" @click="testPush()">测试推送飞书</button>
            </header>
            <div class="notify-list" x-show="logs.length">
              <template x-for="log in logs" :key="log.id">
                <article class="notify-item" :class="log.status">
                  <span class="notify-time" x-text="formatTime(log.created_at)"></span>
                  <span class="notify-type" x-text="log.type"></span>
                  <span class="notify-status" x-text="log.status"></span>
                  <p x-text="log.content"></p>
                </article>
              </template>
            </div>
            <p class="empty-state" x-show="!logs.length">暂无通知。点击"测试推送飞书"看 Agent 主动打扰。</p>
          </section>
        </section>
      </template>

      <!-- 重规划模态 -->
      <div x-show="replanOpen" class="modal-overlay" @click.self="replanOpen=false" x-cloak>
        <div class="modal">
          <header class="modal-head">
            <span class="eyebrow">动态重算</span>
            <h3>砍需求提案</h3>
          </header>
          <template x-if="replanLoading">
            <p class="modal-loading">导航员正在计算偏航缺口…</p>
          </template>
          <template x-if="!replanLoading && !replanProposal">
            <div class="modal-body">
              <p class="rationale">产能充足，无需砍需求。如需测试重规划，请先缩短截止日期或增加任务量制造产能缺口。</p>
              <footer class="modal-actions">
                <button class="btn-ghost" @click="replanOpen=false">关闭</button>
              </footer>
            </div>
          </template>
          <template x-if="!replanLoading && replanProposal">
            <div class="modal-body">
              <div class="gap-stat">
                <span class="gap-label">产能缺口</span>
                <strong class="gap-value" x-text="`${replanGapDays} 人天`"></strong>
              </div>
              <p class="rationale" x-text="replanProposal.rationale"></p>
              <div class="proposal-block" x-show="replanProposal.cut_tasks?.length">
                <span class="block-label">建议砍掉</span>
                <span class="block-value" x-text="replanProposal.cut_tasks?.join(', ')"></span>
              </div>
              <div class="proposal-block" x-show="replanProposal.downgrade_tasks?.length">
                <span class="block-label">建议降级</span>
                <div class="downgrade-list">
                  <template x-for="d in replanProposal.downgrade_tasks" :key="d.id">
                    <span class="downgrade-chip" x-text="`#${d.id} ${d.from}→${d.to}`"></span>
                  </template>
                </div>
              </div>
              <footer class="modal-actions">
                <button class="btn-accent" @click="applyReplan()" :disabled="replanApplying">
                  <span x-text="replanApplying ? '应用中…' : '确认应用'"></span>
                </button>
                <button class="btn-ghost" @click="replanOpen=false">取消</button>
              </footer>
            </div>
          </template>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script src="/static/components/project-create.js"></script>
  <script src="/static/components/task-board.js"></script>
  <script src="/static/components/upload-panel.js"></script>
  <script src="/static/components/notify-log.js"></script>
  <script src="/static/components/auth.js"></script>
  <script src="/static/components/project-list.js"></script>
  <script src="/static/components/task-assign.js"></script>
  <script src="/static/components/member-progress.js"></script>
</body>

</html>
